name: Desktop packages

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "backend/**"
      - "desktop/**"
      - "frontend/**"
      - "scripts/**"
      - "alembic/**"
      - "requirements*.txt"
      - "requirements*.lock"
      - ".github/workflows/desktop-release.yml"
  push:
    tags: ["v*"]
  schedule:
    - cron: "17 4 * * 1"

concurrency:
  group: desktop-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

permissions:
  contents: read

jobs:
  supply-chain:
    name: Release supply-chain evidence
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Python 3.12
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version-file: .python-version
          cache: pip
          cache-dependency-path: requirements-dev.lock
      - name: Validate release version metadata
        run: python scripts/check_release_versions.py
      - name: Install Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install Rust
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
        with:
          toolchain: stable
      - name: Install locked application and audit dependencies
        run: |
          mkdir -p "$RUNNER_TEMP/careeros"
          python -m pip install --require-hashes --requirement requirements-dev.lock
          npm ci --prefix frontend --ignore-scripts
          cargo install cargo-audit --version 0.22.2 --locked
          cargo install cargo-cyclonedx --version 0.5.9 --locked
          cargo install cargo-deny --version 0.20.2 --locked
      - name: Audit Python and create evidence
        run: |
          python -m pip_audit --disable-pip --require-hashes --requirement requirements.lock
          python -m pip_audit --disable-pip --require-hashes --requirement requirements-dev.lock
          python -m pip_audit --disable-pip --require-hashes --requirement requirements-tooling.lock
          python -m pip_audit --disable-pip --require-hashes --requirement requirements.lock \
            --format cyclonedx-json --output "$RUNNER_TEMP/careeros/backend-sbom.cdx.json"
          pip-licenses --from=mixed --format=json \
            --output-file "$RUNNER_TEMP/careeros/backend-licenses.json" \
            --fail-on "GNU General Public License;GNU Affero General Public License;AGPL-1.0;AGPL-3.0;Server Side Public License;SSPL-1.0;Business Source License;BUSL-1.1" \
            --partial-match
      - name: Audit npm and create evidence
        working-directory: frontend
        run: |
          npm audit --audit-level=high
          npm sbom --sbom-format cyclonedx > "$RUNNER_TEMP/careeros/frontend-sbom.cdx.json"
          npx --no-install license-checker-rseidelsohn --production \
            --excludePrivatePackages \
            --onlyAllow "MIT;MIT OR Apache-2.0;Apache-2.0 OR MIT" \
            --json --out "$RUNNER_TEMP/careeros/frontend-licenses.json"
      - name: Audit Cargo and create evidence
        working-directory: frontend/src-tauri
        run: |
          python3 ../../scripts/check_security_exceptions.py
          cargo audit --deny unsound --ignore RUSTSEC-2024-0429
          cargo deny --all-features check licenses
          cargo cyclonedx --all-features --target all --format json \
            --spec-version 1.5 --override-filename rust-sbom
          mv rust-sbom.json "$RUNNER_TEMP/careeros/rust-sbom.cdx.json"
          cargo deny --all-features list --format json \
            > "$RUNNER_TEMP/careeros/rust-licenses.json"
          cargo tree --locked --target all -i glib@0.18.5 \
            > "$RUNNER_TEMP/careeros/cargo-exception-tree.txt"
      - name: Upload release supply-chain evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-supply-chain
          path: ${{ runner.temp }}/careeros
          if-no-files-found: error

  native:
    name: ${{ matrix.label }}
    if: github.event_name != 'pull_request'
    needs: supply-chain
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    permissions:
      attestations: write
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows x64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis,msi
          - label: Windows ARM64
            runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            bundles: nsis,msi
          - label: macOS Intel
            runner: macos-15-intel
            target: x86_64-apple-darwin
            bundles: app,dmg
          - label: macOS Apple Silicon
            runner: macos-15
            target: aarch64-apple-darwin
            bundles: app,dmg
          - label: Linux x64
            runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: appimage,deb
          - label: Linux ARM64
            runner: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            bundles: appimage,deb

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Python 3.12
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          # 3.12.10 is the newest 3.12 build published by actions/python-versions
          # for Windows, macOS and Linux on both x64 and ARM64.
          python-version: "3.12.10"
          cache: pip
          cache-dependency-path: |
            requirements.lock
            requirements-tooling.lock

      - name: Install Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Rust target
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install Linux desktop prerequisites
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils xvfb

      - name: Install locked dependencies
        run: |
          python -m pip install --require-hashes -r requirements.lock
          python -m pip install --require-hashes -r requirements-tooling.lock
          npm ci --prefix frontend

      - name: Freeze and smoke-test local backend
        run: python scripts/build_backend_sidecar.py

      - name: Verify native sidecar architecture
        env:
          EXPECTED_TARGET: ${{ matrix.target }}
        run: python scripts/verify_sidecar_build.py

      - name: Exercise packaged backend lifecycle
        run: python -m pytest tests/desktop/test_packaged_lifecycle.py -q

      - name: Build native installers
        id: tauri
        uses: tauri-apps/tauri-action@944946e3e4cac6603d1fe8f514171e9ecd3c78aa # v1
        with:
          projectPath: frontend
          tauriScript: npm run tauri
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: Exercise Windows MSI and NSIS lifecycle
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/smoke_windows_installer.ps1 -Target '${{ matrix.target }}' -IncludeNsisInstall

      - name: Exercise macOS and Linux native packages
        if: runner.os != 'Windows'
        run: python scripts/smoke_native_bundle.py --target '${{ matrix.target }}'

      - name: Write bundle checksums
        run: >-
          python scripts/write_artifact_checksums.py
          --target ${{ matrix.target }}
          --output release-metadata/checksums-${{ matrix.target }}.sha256

      - name: Attest verified native packages
        if: github.event_name != 'pull_request'
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4
        with:
          # actions/attest parses this input as CSV before globbing, so brace globs
          # containing commas are unsafe here. Unmatched per-OS patterns are ignored.
          subject-path: |
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb

      - name: Upload smoke-tested release assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: native-${{ matrix.target }}
          path: |
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            release-metadata/checksums-${{ matrix.target }}.sha256
          if-no-files-found: error

  assemble-release:
    name: Assemble verified release assets
    if: github.event_name != 'pull_request'
    needs: [supply-chain, native]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Download smoke-tested native packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: native-*
          path: release-staging/native
          merge-multiple: true
      - name: Download supply-chain evidence
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: release-supply-chain
          path: release-staging/supply-chain
      - name: Prepare collision-safe release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          while IFS= read -r -d '' source; do
            destination="release-assets/$(basename "$source")"
            if [[ -e "$destination" ]]; then
              echo "Release asset collision: $destination" >&2
              exit 1
            fi
            cp "$source" "$destination"
          done < <(find release-staging/native -type f \( \
            -iname '*.AppImage' -o -iname '*.deb' -o -iname '*.dmg' -o \
            -iname '*.exe' -o -iname '*.msi' -o -name 'checksums-*.sha256' \
          \) -print0)
          tar -C release-staging/supply-chain -czf \
            release-assets/supply-chain-evidence.tar.gz .
          find release-assets -maxdepth 1 -type f -printf '%f\n' | sort
          test "$(find release-assets -maxdepth 1 -type f -iname '*.exe' | wc -l)" -eq 2
          test "$(find release-assets -maxdepth 1 -type f -iname '*.msi' | wc -l)" -eq 2
          test "$(find release-assets -maxdepth 1 -type f -iname '*.dmg' | wc -l)" -eq 2
          test "$(find release-assets -maxdepth 1 -type f -iname '*.AppImage' | wc -l)" -eq 2
          test "$(find release-assets -maxdepth 1 -type f -iname '*.deb' | wc -l)" -eq 2
          test "$(find release-assets -maxdepth 1 -type f -name 'checksums-*.sha256' | wc -l)" -eq 6
          test "$(find release-assets -maxdepth 1 -type f | wc -l)" -eq 17
      - name: Upload verified release inventory
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: verified-release-assets
          path: release-assets/*
          if-no-files-found: error
          retention-days: 14

  publish-release:
    name: Publish verified desktop release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: assemble-release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Download verified release inventory
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: verified-release-assets
          path: release-assets
      - name: Create, populate and publish release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_NOTES: |
            Native CareerOS Local desktop packages, built from this tag and gated by
            architecture checks, packaged lifecycle tests, native bundle extraction,
            application reopen checks, NSIS install/uninstall smoke tests, SHA-256
            inventories and GitHub build-provenance attestations.

            Highlights include the public portfolio site and reproducible product tour,
            stronger Python/React/Rust verification, atomic demo-media publishing,
            accessibility hardening, reliable zero-config SQLite startup, and a native
            release matrix covering Windows, macOS and Linux on x64 and ARM64.

            Model installation remains optional and explicit. These community builds
            are currently unsigned; Windows SmartScreen and macOS Gatekeeper may warn.

            Verify a downloaded package with:
            `gh attestation verify <package> -R ${{ github.repository }}`
        run: |
          set -euo pipefail
          tag="$GITHUB_REF_NAME"
          if release_is_draft="$(gh release view "$tag" --json isDraft --jq .isDraft 2>/dev/null)"; then
            if [[ "$release_is_draft" != "true" ]]; then
              echo "Refusing to overwrite the already-published release $tag" >&2
              exit 1
            fi
          else
            gh release create "$tag" --draft --verify-tag \
              --title "CareerOS Local $tag" --notes "$RELEASE_NOTES"
          fi
          mapfile -d '' assets < <(find release-assets -maxdepth 1 -type f -print0)
          gh release upload "$tag" "${assets[@]}" --clobber
          gh release edit "$tag" --draft=false --latest
