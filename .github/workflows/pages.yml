name: Portfolio site

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - "docs/**"
      - "scripts/render_brand_assets.mjs"
      - "scripts/validate_portfolio_site.py"
      - "tests/backend/unit/test_validate_portfolio_site.py"
      - ".github/workflows/pages.yml"
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "scripts/render_brand_assets.mjs"
      - "scripts/validate_portfolio_site.py"
      - "tests/backend/unit/test_validate_portfolio_site.py"
      - ".github/workflows/pages.yml"

permissions:
  contents: read

concurrency:
  group: pages-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Validate and package site
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Validate static portfolio
        run: python scripts/validate_portfolio_site.py

      - name: Configure Pages
        if: github.event_name != 'pull_request'
        id: pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs

  deploy:
    name: Deploy portfolio
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
