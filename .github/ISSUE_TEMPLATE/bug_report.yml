name: Bug report
description: Report a reproducible CareerOS Local problem without including private career data.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "Never attach a real Career Vault, resume, database, log containing personal data, or secret."
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the observed behavior and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      placeholder: "1. Start CareerOS Local\n2. Open …\n3. Observe …"
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - Native desktop app
        - Browser development mode
        - Backend or API
        - Packaging or installation
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: "vX.Y.Z or commit SHA"
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed personal data, credentials, tokens and private documents from this report.
          required: true
