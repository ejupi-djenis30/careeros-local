name: Feature request
description: Propose a focused improvement that preserves the local-first boundary.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: User problem
      description: What career workflow is difficult today, and for whom?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: Describe the result without prescribing an implementation.
    validations:
      required: true
  - type: textarea
    id: privacy
    attributes:
      label: Local-first and privacy impact
      description: Note any new data, network, model, export or deletion boundary.
    validations:
      required: true
