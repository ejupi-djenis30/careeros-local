services:
  g4f:
    image: hlohaus789/g4f:latest-slim
    restart: always
    user: "0:0"
    environment:
      - HOME=/app/data/home
      - XDG_CONFIG_HOME=/app/data/config
      - XDG_CACHE_HOME=/app/data/cache
    ports:
      - "1337:8080"
      - "7900:7900"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys,urllib.request; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/v1/models', timeout=5).getcode() == 200 else 1)",
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s
    volumes:
      - g4f_app_data:/app/data
      - g4f_har_and_cookies:/app/har_and_cookies
      - g4f_generated_media:/app/generated_media

volumes:
  g4f_app_data:
  g4f_har_and_cookies:
  g4f_generated_media:
