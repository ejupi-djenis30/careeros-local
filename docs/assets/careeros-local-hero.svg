      <path d="M13-13.5A18 18 0 1 0 13 13.5" fill="none" stroke="#b9f27c" stroke-width="7" stroke-linecap="round"/>
      <path d="M6 0h7" fill="none" stroke="#f4f7f2" stroke-width="3.5" stroke-linecap="round"/>
      <circle cx="15" cy="0" r="5" fill="#b9f27c"/>
      <circle cx="15" cy="0" r="1.8" fill="#101411"/>
