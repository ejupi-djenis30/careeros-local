      <rect x="246" y="216" width="128" height="8" rx="4" fill="#f4f7f2" fill-opacity="0.9"/>
      <rect x="246" y="244" width="154" height="8" rx="4" fill="#9eaaa2" fill-opacity="0.5"/>
      <rect x="246" y="272" width="96" height="8" rx="4" fill="#82b9ff" fill-opacity="0.85"/>
      <circle cx="388" cy="276" r="12" fill="#b9f27c"/>
