  <rect width="1774" height="887" fill="url(#hero-field)"/>
  <rect data-frame="true" x="48" y="48" width="1678" height="791" rx="44" fill="none" stroke="#2b362f" stroke-width="2"/>
  <path d="M80 443.5h1614M887 80v727" fill="none" stroke="#202a23"/>
