      <path d="M136 296h288" stroke="#2b362f"/>
      <circle cx="158" cy="304" r="3" fill="#9eaaa2"/>
      <circle cx="170" cy="304" r="3" fill="#b9f27c"/>
      <circle cx="182" cy="304" r="3" fill="#82b9ff"/>
