<svg xmlns="http://www.w3.org/2000/svg" width="1774" height="887" viewBox="0 0 1774 887" role="img" aria-labelledby="title description">
  <title id="title">CareerOS Local system map</title>
  <desc id="description">A precise geometric composition showing four private career workflows connected to one local vault.</desc>
  <defs>
    <radialGradient id="hero-field" cx="50%" cy="50%" r="66%">
      <stop offset="0" stop-color="#18221c"/>
      <stop offset="0.58" stop-color="#0f1511"/>
      <stop offset="1" stop-color="#0a0d0b"/>
    </radialGradient>
    <linearGradient id="hero-panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#151c17"/>
      <stop offset="1" stop-color="#101411"/>
    </linearGradient>
    <linearGradient id="hero-signal" x1="0" y1="0" x2="1" y2="0">
