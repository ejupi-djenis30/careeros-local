openapi: 3.1.0
info:
  title: CareerOS Local Desktop Additions
  version: 1.1.2
  description: New local model management and evaluation interfaces for feature 001.
servers:
  - url: http://127.0.0.1:{port}/api/v1
    variables:
      port:
        default: "8000"
security:
  - desktopSession: []
paths:
  /local-model/status:
    get:
      operationId: getLocalModelStatus
      responses:
        "200":
          description: Runtime, installation and evaluation readiness without sensitive paths.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocalModelStatus"
  /local-model/catalog:
    get:
      operationId: getLocalModelCatalog
      responses:
        "200":
          description: Checked-in model choices safe for explicit local acquisition.
          content:
            application/json:
              schema:
                type: object
                required: [catalogVersion, models]
                properties:
                  catalogVersion: { type: string }
                  models:
                    type: array
                    items: { $ref: "#/components/schemas/ModelCatalogEntry" }
  /local-model/readiness:
    post:
      operationId: verifyLocalAnalysisReadiness
      description: Runs one content-free schema-constrained probe through the configured local model.
      responses:
        "200":
          description: Stable local-analysis readiness diagnostics; the response contains no prompt or model output.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LocalModelReadiness" }
        "401": { description: The local user session is not authenticated. }
  /applications/agenda:
    get:
      operationId: getApplicationAgenda
      description: Builds a deterministic private queue from owned scalar application projections.
      parameters:
        - name: local_day_end
          in: query
          required: true
          description: Timezone-aware instant of the browser's next local midnight, at most 26 hours after generation.
          schema: { type: string, format: date-time }
        - name: horizon_days
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 30, default: 7 }
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
      responses:
        "200":
          description: User-scoped agenda with explicit later and limit-truncation counts.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApplicationAgendaResponse" }
        "401": { description: The local user session is not authenticated. }
        "422": { description: A query bound or persisted next-action projection is invalid. }
  /local-model/install:
    post:
      operationId: installLocalModel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [modelKey, expectedCatalogVersion, consent]
              properties:
                modelKey: { type: string, pattern: "^[a-z0-9][a-z0-9._-]{1,80}$" }
                expectedCatalogVersion: { type: string }
                consent: { const: true }
      responses:
        "202":
          description: Installation started or resumed.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LocalModelStatus" }
        "409": { description: Another installation or incompatible state is active. }
        "422": { description: Catalog choice, version or consent is invalid. }
  /local-model/cancel:
    post:
      operationId: cancelLocalModelInstall
      responses:
        "202": { description: Cancellation requested and partial files scheduled for removal. }
  /local-model/restart:
    post:
      operationId: restartLocalModel
      responses:
        "202": { description: A bounded local runtime restart was requested. }
        "409": { description: No verified model is installed. }
  /ai-evaluations:
    get:
      operationId: listLocalModelEvaluations
      responses:
        "200":
          description: Content-free aggregate evaluation history.
  /ai-evaluations/run:
    post:
      operationId: runLocalModelEvaluation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [mode]
              properties:
                mode: { type: string, enum: [offline, live] }
      responses:
        "202": { description: Offline evaluation accepted. }
        "409": { description: Model unavailable or evaluation already active. }
  /applications/{application_id}/readiness:
    get:
      operationId: getApplicationReadiness
      parameters:
        - name: application_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Deterministic local preflight completeness report.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApplicationReadinessReport" }
        "404": { description: The application does not belong to the current user. }
  /applications/{application_id}/readiness/export:
    get:
      operationId: exportApplicationReadiness
      parameters:
        - name: application_id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: format
          in: query
          required: false
          schema: { type: string, enum: [json, markdown], default: json }
      responses:
        "200":
          description: Canonical report bytes; X-Content-SHA256 hashes the exact response body.
          headers:
            X-Content-SHA256:
              schema: { type: string, pattern: "^[a-f0-9]{64}$" }
            Content-Disposition:
              schema: { type: string }
          content:
            application/json:
              schema: { type: string, format: binary }
            text/markdown:
              schema: { type: string, format: binary }
        "404": { description: The application does not belong to the current user. }
  /applications/{application_id}/preparation:
    patch:
      operationId: updateApplicationPreparation
      parameters:
        - name: application_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ApplicationPreparationUpdate" }
      responses:
        "200": { description: Revisioned application with a content-free preparation audit event. }
        "404": { description: The application does not belong to the current user. }
        "409": { description: The expected revision is stale. }
        "422": { description: A URL, email, resume link or update payload is invalid. }
components:
  securitySchemes:
    desktopSession:
      type: apiKey
      in: header
      name: X-CareerOS-Session
      description: Per-launch secret supplied by the native shell; disabled in explicit browser development.
  schemas:
    LocalModelStatus:
      type: object
      additionalProperties: false
      required:
        - runtimeMode
        - runtimeState
        - ready
        - configuredModel
        - installState
        - downloadedBytes
        - totalBytes
        - canInstall
        - canCancel
      properties:
        runtimeMode: { type: string, enum: [managed_llama_cpp, ollama] }
        runtimeState: { type: string, enum: [unavailable, stopped, starting, ready, failed] }
        ready: { type: boolean }
        configuredModel: { type: string }
        installedModels: { type: array, items: { type: string } }
        installState:
          type: string
          enum: [absent, checking_space, downloading_runtime, verifying_runtime, downloading_model, verifying_model, installing, ready, cancelling, failed]
        downloadedBytes: { type: integer, minimum: 0 }
        totalBytes: { type: integer, minimum: 0 }
        errorCode: { type: [string, "null"] }
        canInstall: { type: boolean }
        canCancel: { type: boolean }
        catalogVersion: { type: string }
        modelLicense: { type: [string, "null"] }
    LocalModelReadiness:
      type: object
      additionalProperties: false
      required: [required, ready, runtime, configured_model, privacy_boundary, checks]
      properties:
        required: { const: true }
        ready: { type: boolean }
        runtime: { type: string, enum: [llama.cpp, ollama] }
        configured_model: { type: string }
        model_id: { type: [string, "null"] }
        privacy_boundary: { const: local-only }
        error_code: { type: [string, "null"] }
        checks:
          type: array
          minItems: 1
          maxItems: 4
          items:
            type: object
            additionalProperties: false
            required: [code, status]
            properties:
              code:
                type: string
                enum: [endpoint_allowed, runtime_reachable, model_available, structured_output]
              status: { type: string, enum: [passed, failed] }
    ModelCatalogEntry:
      type: object
      additionalProperties: false
      required: [key, displayName, author, license, parameters, quantization, sizeBytes, minimumRamBytes, recommendedRamBytes]
      properties:
        key: { type: string }
        displayName: { type: string }
        author: { type: string }
        license: { type: string }
        parameters: { type: string }
        quantization: { type: string }
        sizeBytes: { type: integer, minimum: 1 }
        minimumRamBytes: { type: integer, minimum: 1 }
        recommendedRamBytes: { type: integer, minimum: 1 }
        contextTokens: { type: integer, minimum: 1024 }
    ApplicationAgendaResponse:
      type: object
      additionalProperties: false
      required: [generated_at, local_day_end, horizon_end, active_count, visible_count, later_count, truncated_count, items]
      properties:
        generated_at: { type: string, format: date-time }
        local_day_end: { type: string, format: date-time }
        horizon_end: { type: string, format: date-time }
        active_count: { type: integer, minimum: 0 }
        visible_count: { type: integer, minimum: 0 }
        later_count: { type: integer, minimum: 0 }
        truncated_count: { type: integer, minimum: 0 }
        items:
          type: array
          maxItems: 200
          items: { $ref: "#/components/schemas/ApplicationAgendaItem" }
    ApplicationAgendaItem:
      type: object
      additionalProperties: false
      required: [application_id, application_revision, title, company, current_stage, latest_event_at, state, next_action]
      properties:
        application_id: { type: string, format: uuid }
        application_revision: { type: integer, minimum: 1 }
        title: { type: string, minLength: 1, maxLength: 240 }
        company: { type: string, minLength: 1, maxLength: 240 }
        current_stage:
          type: string
          enum: [saved, preparing, applied, screening, interview, offer, accepted]
        latest_event_at: { type: string, format: date-time }
        state:
          type: string
          enum: [overdue, today, upcoming, unscheduled, needs_action]
        next_action:
          oneOf:
            - { $ref: "#/components/schemas/ApplicationNextAction" }
            - { type: "null" }
    ApplicationNextAction:
      type: object
      additionalProperties: false
      required: [id, title, due_at, priority]
      properties:
        id: { type: string, minLength: 1, maxLength: 36 }
        title: { type: string, minLength: 1, maxLength: 500 }
        due_at:
          oneOf:
            - { type: string, format: date-time }
            - { type: "null" }
        priority: { type: string, enum: [low, normal, high, urgent] }
    ApplicationPreparationUpdate:
      type: object
      additionalProperties: false
      required: [expected_revision]
      anyOf:
        - required: [title]
        - required: [company]
        - required: [description]
        - required: [application_url]
        - required: [application_email]
        - required: [resume_version_id]
      properties:
        expected_revision: { type: integer, minimum: 1 }
        title: { type: [string, "null"], maxLength: 240 }
        company: { type: [string, "null"], maxLength: 240 }
        description: { type: [string, "null"], maxLength: 100000 }
        application_url: { type: [string, "null"], maxLength: 2048 }
        application_email: { type: [string, "null"], maxLength: 320 }
        resume_version_id: { type: [string, "null"], maxLength: 36 }
    ApplicationReadinessReport:
      type: object
      additionalProperties: false
      required: [schema_version, application_id, application_revision, role_title, company, status, score_kind, completeness_score, blocker_count, warning_count, checks, fingerprint]
      properties:
        schema_version: { const: "1.0" }
        application_id: { type: string, format: uuid }
        application_revision: { type: integer, minimum: 1 }
        role_title: { type: string }
        company: { type: string }
        status: { type: string, enum: [ready, action_needed, blocked] }
        score_kind: { const: preflight_completeness }
        completeness_score: { type: integer, minimum: 0, maximum: 100 }
        blocker_count: { type: integer, minimum: 0 }
        warning_count: { type: integer, minimum: 0 }
        checks:
          type: array
          items: { $ref: "#/components/schemas/ApplicationReadinessCheck" }
        fingerprint: { type: string, pattern: "^[a-f0-9]{64}$" }
    ApplicationReadinessCheck:
      type: object
      additionalProperties: false
      required: [id, status, points_awarded, points_available, evidence]
      properties:
        id: { type: string }
        status: { type: string, enum: [pass, warning, blocker] }
        points_awarded: { type: integer, minimum: 0, maximum: 100 }
        points_available: { type: integer, minimum: 1, maximum: 100 }
        evidence:
          type: array
          items: { $ref: "#/components/schemas/ReadinessEvidence" }
        action: { type: [string, "null"] }
    ReadinessEvidence:
      type: object
      additionalProperties: false
      required: [key, value]
      properties:
        key: { type: string }
        value: { type: string }
